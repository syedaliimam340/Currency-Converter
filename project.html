<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form action="">
            <div class="amount">Amount:
                <input type="text" id="amount" placeholder="Enter amount" value="1">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p>&nbsp;&nbsp;&nbsp;&nbsp;From:</p>
                    <div class="select-container">
                        <div class="flag-container">
                            <img src="https://flagsapi.com/PK/flat/64.png" alt="Meky ladly internet speed teez krwa">
                        </div>
                        <select name="from">

                        </select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <div class="to">
                    <p>&nbsp;&nbsp;&nbsp;&nbsp;To:</p>
                    <div class="select-container">
                        <div class="flag-container">
                            <img src="https://flagsapi.com/US/flat/64.png" alt="Meky ladly internet speed teez krwa">
                        </div>
                        <select name="to">



                        </select>
                    </div>
                </div>

                
                <button>Convert</button>

        </form>
        
    </div>
    <div class="msg">1 USD =1.45AUD </div>

</body>

</html>
